name: AI Issue Fixer

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  ai-fix:
    runs-on: self-hosted
    # Only run if the label that was just added is exactly "ai_fix"
    if: github.event.label.name == 'ai_fix'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Post processing started comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🤖 **AI Fixer engaged** - Analyzing issue and generating a fix...'
            })

      - name: Run AI fix script
        id: ai_fix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LANGDOCK_API_KEY: ${{ secrets.LANGDOCK_API_KEY }}
          LANGDOCK_BASE_URL: ${{ vars.LANGDOCK_BASE_URL }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO_NAME: ${{ github.repository }}
        run: node .github/scripts/ai-fix.js

      - name: Generate GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.AI_FIXER_APP_ID }}
          private-key: ${{ secrets.AI_FIXER_APP_PRIVATE_KEY }}

      - name: Create Pull Request
        id: cpr
        if: steps.ai_fix.outputs.changes_made == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ steps.app_token.outputs.token }}
          commit-message: "fix: AI-generated fix for issue #${{ github.event.issue.number }}"
          title: "🤖 AI Fix: ${{ github.event.issue.title }}"
          body: |
            Automated fix generated by AI Fixer for issue #${{ github.event.issue.number }}.

            **Summary of changes:**
            ${{ steps.ai_fix.outputs.summary }}

            Please review carefully before merging.
          branch: ai-fix/issue-${{ github.event.issue.number }}
          delete-branch: true

      - name: Post success comment
        if: steps.ai_fix.outputs.changes_made == 'true' && steps.cpr.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **Fix applied successfully**\n\n📝 **Summary:**\n${{ steps.ai_fix.outputs.summary }}\n\n🔗 **Pull Request:** #${{ steps.cpr.outputs.pull_request_number }}`
            })

      - name: Post no changes comment
        if: steps.ai_fix.outputs.changes_made == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ **No changes generated** - The AI fixer could not generate a safe fix for this issue.\n\n${{ steps.ai_fix.outputs.reason }}'
            })

      - name: Post failure comment
        if: failure() && steps.ai_fix.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **Fix attempt failed** - An error occurred while processing the fix. Please check the workflow logs.'
            })

